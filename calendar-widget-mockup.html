<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Widget Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    color: #fff;
  }

  h1 {
    font-size: 16px;
    font-weight: 700;
    color: #6b6b83;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .subtitle {
    color: #4a4a5e;
    font-size: 13px;
    margin-bottom: 24px;
  }

  /* ==================== */
  /*     CONTROLS         */
  /* ==================== */

  .controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
    max-width: 500px;
  }

  .controls button {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #ccc;
    background: rgba(255,255,255,0.05);
  }

  .controls button:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }

  .controls button.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
  }

  .theme-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .theme-toggle button {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    color: #888;
    background: transparent;
    transition: all 0.15s;
  }

  .theme-toggle button.active {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-color: rgba(255,255,255,0.25);
  }

  /* ==================== */
  /*    PHONE FRAME       */
  /* ==================== */

  .phone-frame {
    width: 390px;
    background: #000;
    border-radius: 44px;
    padding: 55px 16px 35px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    margin-bottom: 40px;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .phone-status-bar {
    display: flex;
    justify-content: space-between;
    padding: 0 12px 12px;
    font-size: 13px;
    color: #fff;
    font-weight: 600;
  }

  /* ==================== */
  /*   WIDGET BASE        */
  /* ==================== */

  .widget-calendar {
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    transition: all 0.3s ease;
  }

  /* DARK theme */
  .widget-calendar.theme-dark {
    background: rgba(28, 28, 32, 0.95);
    backdrop-filter: blur(40px);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3), inset 0 0.5px 0 rgba(255,255,255,0.05);
  }

  /* LIGHT theme */
  .widget-calendar.theme-light {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(40px);
    box-shadow: 0 2px 20px rgba(0,0,0,0.08), inset 0 0.5px 0 rgba(255,255,255,0.8);
  }

  .widget-calendar.theme-light * {
    color: #1c1c1e;
  }

  .widget-calendar.theme-light .widget-header {
    border-bottom-color: rgba(0,0,0,0.06);
  }

  .widget-calendar.theme-light .event-time {
    color: #8e8e93 !important;
  }

  .widget-calendar.theme-light .event-location {
    color: #8e8e93 !important;
  }

  .widget-calendar.theme-light .day-separator {
    color: #8e8e93 !important;
  }

  .widget-calendar.theme-light .day-separator::after {
    background: rgba(0,0,0,0.06) !important;
  }

  .widget-calendar.theme-light .scroll-fade-bottom {
    background: linear-gradient(transparent, rgba(255,255,255,0.95)) !important;
  }

  .widget-calendar.theme-light .empty-state-sub {
    color: #8e8e93 !important;
  }

  .widget-calendar.theme-light .now-indicator-label {
    background: #ff3b30 !important;
    color: #fff !important;
  }

  .widget-calendar.theme-light .now-indicator-line {
    background: #ff3b30 !important;
  }

  .widget-calendar.theme-light .now-indicator-dot {
    background: #ff3b30 !important;
  }

  .widget-calendar.theme-light .allday-chip {
    background: rgba(0,0,0,0.04) !important;
    color: #1c1c1e !important;
  }

  .widget-calendar.theme-light .header-date-num {
    color: #1c1c1e !important;
  }

  .widget-calendar.theme-light .header-month-year {
    color: #8e8e93 !important;
  }

  .widget-calendar.theme-light .header-weekday {
    color: #ff3b30 !important;
  }

  .widget-calendar.theme-light .event-row:hover {
    background: rgba(0,0,0,0.03) !important;
  }

  /* ==================== */
  /*   WIDGET HEADER      */
  /* ==================== */

  .widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 0.5px solid rgba(255,255,255,0.06);
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .header-date-num {
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
  }

  .header-date-info {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .header-weekday {
    font-size: 13px;
    font-weight: 600;
    color: #ff453a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .header-month-year {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-count {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.06);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .widget-calendar.theme-light .header-count {
    color: #8e8e93 !important;
    background: rgba(0,0,0,0.04) !important;
  }

  /* ==================== */
  /*   EVENT LIST         */
  /* ==================== */

  .event-list {
    max-height: 310px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  /* Custom scrollbar */
  .event-list::-webkit-scrollbar {
    width: 3px;
  }
  .event-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .event-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
  }
  .widget-calendar.theme-light .event-list::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.1);
  }

  .event-list-inner {
    padding: 4px 0 30px;
  }

  /* Scroll fade at bottom */
  .scroll-fade-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(transparent, rgba(28,28,32,0.98));
    pointer-events: none;
    z-index: 2;
    border-radius: 0 0 22px 22px;
  }

  /* ==================== */
  /*   EVENT ROW          */
  /* ==================== */

  .event-row {
    display: flex;
    align-items: flex-start;
    padding: 8px 16px 8px 0;
    margin: 0 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .event-row:hover {
    background: rgba(255,255,255,0.03);
  }

  .event-color-bar {
    width: 3px;
    min-height: 32px;
    border-radius: 2px;
    margin: 2px 12px 2px 8px;
    flex-shrink: 0;
    align-self: stretch;
  }

  .event-time-col {
    width: 52px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .event-time {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    line-height: 1.3;
  }

  .event-time-end {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.2);
  }

  .event-details {
    flex: 1;
    min-width: 0;
  }

  .event-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .widget-calendar.theme-light .event-title {
    color: #1c1c1e !important;
  }

  .event-location {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-relative {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: center;
    margin-left: 8px;
  }

  .event-relative.soon {
    background: rgba(255, 149, 0, 0.15);
    color: #ff9500;
  }

  .event-relative.now {
    background: rgba(255, 59, 48, 0.15);
    color: #ff3b30;
  }

  .event-relative.next {
    background: rgba(10, 132, 255, 0.12);
    color: #0a84ff;
  }

  .widget-calendar.theme-light .event-relative.soon {
    background: rgba(255, 149, 0, 0.1) !important;
  }
  .widget-calendar.theme-light .event-relative.now {
    background: rgba(255, 59, 48, 0.1) !important;
  }
  .widget-calendar.theme-light .event-relative.next {
    background: rgba(10, 132, 255, 0.08) !important;
  }

  /* Active/current event highlight */
  .event-row.active {
    background: rgba(255,59,48,0.06);
  }

  .widget-calendar.theme-light .event-row.active {
    background: rgba(255,59,48,0.04) !important;
  }

  /* ==================== */
  /*   ALL DAY EVENTS     */
  /* ==================== */

  .allday-section {
    display: flex;
    gap: 6px;
    padding: 8px 16px 4px;
    flex-wrap: wrap;
  }

  .allday-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.06);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
  }

  .allday-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ==================== */
  /*   NOW INDICATOR      */
  /* ==================== */

  .now-indicator {
    display: flex;
    align-items: center;
    padding: 0 16px;
    margin: 4px 0;
    position: relative;
  }

  .now-indicator-label {
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    background: #ff453a;
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
    z-index: 1;
  }

  .now-indicator-line {
    flex: 1;
    height: 1.5px;
    background: #ff453a;
    margin-left: 6px;
    opacity: 0.6;
  }

  .now-indicator-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff453a;
    position: absolute;
    left: 12px;
    z-index: 2;
  }

  /* ==================== */
  /*   DAY SEPARATOR      */
  /* ==================== */

  .day-separator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 6px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .day-separator::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.06);
  }

  /* ==================== */
  /*   EMPTY STATE        */
  /* ==================== */

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .empty-state-icon {
    font-size: 36px;
    margin-bottom: 10px;
    opacity: 0.7;
  }

  .empty-state-text {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    margin-bottom: 4px;
  }

  .widget-calendar.theme-light .empty-state-text {
    color: #1c1c1e !important;
  }

  .empty-state-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
  }

  /* ==================== */
  /*   COLOR PALETTE      */
  /* ==================== */

  .color-work { background: #0a84ff; }
  .color-personal { background: #30d158; }
  .color-health { background: #ff9500; }
  .color-social { background: #bf5af2; }
  .color-important { background: #ff453a; }
  .color-travel { background: #64d2ff; }
  .color-study { background: #ffd60a; }

  /* ==================== */
  /*   SIZES SECTION      */
  /* ==================== */

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin: 40px 0 16px;
    text-align: center;
  }

  .sizes-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    margin-bottom: 40px;
  }

  /* 4x1 compact widget */
  .widget-4x1 {
    width: 358px;
    border-radius: 22px;
    overflow: hidden;
  }

  .widget-4x1 .widget-header {
    padding: 10px 14px 8px;
  }

  .widget-4x1 .header-date-num {
    font-size: 26px;
  }

  .widget-4x1 .event-list {
    max-height: 52px;
    overflow: hidden;
  }

  .widget-4x1 .event-row {
    padding: 5px 14px 5px 0;
    margin: 0 6px;
  }

  .widget-4x1 .event-title {
    font-size: 13px;
  }

  .widget-4x1 .scroll-fade-bottom {
    height: 20px;
  }

  /* 2x2 small widget */
  .widget-2x2 {
    width: 170px;
    border-radius: 22px;
    overflow: hidden;
  }

  .widget-2x2 .widget-header {
    padding: 12px 12px 8px;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
  }

  .widget-2x2 .header-date-num {
    font-size: 28px;
  }

  .widget-2x2 .header-right {
    display: none;
  }

  .widget-2x2 .event-list {
    max-height: 120px;
    overflow: hidden;
  }

  .widget-2x2 .event-time-col {
    width: 42px;
  }

  .widget-2x2 .event-time {
    font-size: 11px;
  }

  .widget-2x2 .event-row {
    padding: 4px 10px 4px 0;
    margin: 0 4px;
  }

  .widget-2x2 .event-title {
    font-size: 12px;
  }

  .widget-2x2 .event-location {
    display: none;
  }

  .widget-2x2 .event-color-bar {
    margin: 2px 8px 2px 4px;
    min-height: 24px;
  }

  .widget-2x2 .event-relative {
    display: none;
  }

  .widget-2x2 .allday-section {
    padding: 6px 10px 2px;
  }

  .widget-2x2 .allday-chip {
    font-size: 10px;
    padding: 2px 6px;
  }

  .widget-2x2 .scroll-fade-bottom {
    height: 24px;
  }

  /* Animation for auto-scroll */
  @keyframes autoScroll {
    0%, 15% { transform: translateY(0); }
    50%, 65% { transform: translateY(var(--scroll-offset)); }
    100% { transform: translateY(0); }
  }

  .auto-scroll-inner {
    animation: autoScroll 8s ease-in-out infinite;
  }

  /* Live time pulse */
  @keyframes timePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .now-indicator-dot {
    animation: timePulse 2s ease-in-out infinite;
  }

  /* ==================== */
  /*   COMPARISON GRID    */
  /* ==================== */

  .comparison {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 50px;
  }

  .comp-item {
    text-align: center;
  }

  .comp-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>Calendar Widget</h1>
<p class="subtitle">iOS-style event widget for Android</p>

<div class="theme-toggle">
  <button class="active" onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('light')">Light</button>
</div>

<div class="controls" id="controls">
  <button class="active" onclick="showState('busy-day')">Busy Day</button>
  <button onclick="showState('few-events')">Few Events</button>
  <button onclick="showState('current-event')">Now in Meeting</button>
  <button onclick="showState('empty')">No Events</button>
  <button onclick="showState('tomorrow-peek')">Multi-day</button>
  <button onclick="showState('allday')">All Day Events</button>
</div>

<!-- ======= PHONE FRAME ======= -->

<div class="phone-frame">
  <div class="phone-status-bar">
    <span>9:41</span>
    <span style="display:flex; gap:4px; align-items:center;">
      <span style="font-size:11px">5G</span>
      <span>100%</span>
    </span>
  </div>

  <!-- Main 4x2 Widget -->
  <div class="widget-calendar theme-dark" id="main-widget">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- ======= SIZE VARIANTS ======= -->

<div class="section-title">Size variants</div>

<div class="sizes-row">
  <!-- 4x1 Compact -->
  <div class="comp-item">
    <div class="widget-calendar widget-4x1 theme-dark" id="widget-4x1">
      <!-- Rendered by JS -->
    </div>
    <div class="comp-label">4x1 Compact</div>
  </div>
</div>

<div class="sizes-row">
  <!-- 2x2 Small -->
  <div class="comp-item">
    <div class="widget-calendar widget-2x2 theme-dark" id="widget-2x2-a">
      <!-- Rendered by JS -->
    </div>
    <div class="comp-label">2x2 Small</div>
  </div>

  <div class="comp-item">
    <div class="widget-calendar widget-2x2 theme-dark" id="widget-2x2-b">
      <!-- Rendered by JS -->
    </div>
    <div class="comp-label">2x2 Empty</div>
  </div>
</div>

<!-- ======= DESIGN NOTES ======= -->

<div class="section-title">Design system</div>

<div style="max-width: 420px; margin: 0 auto 60px; display: flex; flex-direction: column; gap: 12px;">
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-work"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Work / Meetings</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#0A84FF</span>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-personal"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Personal</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#30D158</span>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-health"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Health / Fitness</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#FF9500</span>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-social"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Social</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#BF5AF2</span>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-important"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Important / Deadlines</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#FF453A</span>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-travel"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Travel</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#64D2FF</span>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 24px; height: 24px; border-radius: 6px;" class="color-study"></div>
    <span style="font-size: 13px; color: #888; font-weight: 500;">Study / Learning</span>
    <span style="font-size: 11px; color: #555; margin-left: auto;">#FFD60A</span>
  </div>
</div>

<script>

// ==================== RENDER ====================

let currentTheme = 'dark';
let currentState = 'busy-day';

function setTheme(theme) {
  currentTheme = theme;
  document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function showState(state) {
  currentState = state;
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function renderWidget(container, data, isMain) {
  const themeClass = `theme-${currentTheme}`;

  // Preserve size classes
  const sizeClasses = [];
  if (container.classList.contains('widget-4x1')) sizeClasses.push('widget-4x1');
  if (container.classList.contains('widget-2x2')) sizeClasses.push('widget-2x2');

  container.className = `widget-calendar ${sizeClasses.join(' ')} ${themeClass}`;

  const eventCount = data.events.length + (data.allday ? data.allday.length : 0);

  let html = '';

  // Header
  html += `
    <div class="widget-header">
      <div class="header-left">
        <span class="header-date-num">${data.date.num}</span>
        <div class="header-date-info">
          <span class="header-weekday">${data.date.weekday}</span>
          <span class="header-month-year">${data.date.month}</span>
        </div>
      </div>
      <div class="header-right">
        ${eventCount > 0 ? `<span class="header-count">${eventCount} ${declEvents(eventCount)}</span>` : ''}
      </div>
    </div>
  `;

  // Empty state
  if (data.empty) {
    html += `
      <div class="empty-state">
        <div class="empty-state-icon">&#x2600;&#xFE0F;</div>
        <div class="empty-state-text">Нет событий</div>
        <div class="empty-state-sub">Свободный день</div>
      </div>
    `;
    container.innerHTML = html;
    return;
  }

  // Event list
  html += `<div class="event-list"><div class="event-list-inner">`;

  // All-day events
  if (data.allday && data.allday.length > 0) {
    html += `<div class="allday-section">`;
    for (const ad of data.allday) {
      html += `
        <div class="allday-chip">
          <div class="allday-dot color-${ad.color}"></div>
          ${ad.title}
        </div>
      `;
    }
    html += `</div>`;
  }

  // Events with NOW indicator
  for (let i = 0; i < data.events.length; i++) {
    if (data.nowBefore === i) {
      html += renderNowIndicator();
    }
    html += renderEvent(data.events[i]);
  }

  // Tomorrow section
  if (data.tomorrow) {
    html += `<div class="day-separator">${data.tomorrow.label}</div>`;
    for (const ev of data.tomorrow.events) {
      html += renderEvent(ev);
    }
  }

  html += `</div></div>`;
  html += `<div class="scroll-fade-bottom"></div>`;

  container.innerHTML = html;
}

function renderEvent(ev) {
  const activeClass = ev.active ? 'active' : '';
  const pastOpacity = ev.past ? 'opacity: 0.4;' : '';

  let relativeHtml = '';
  if (ev.relative) {
    relativeHtml = `<span class="event-relative ${ev.relative}">${ev.relativeText}</span>`;
  }

  return `
    <div class="event-row ${activeClass}" style="${pastOpacity}">
      <div class="event-color-bar color-${ev.color}"></div>
      <div class="event-time-col">
        <div class="event-time">${ev.time}</div>
        <div class="event-time-end">${ev.end}</div>
      </div>
      <div class="event-details">
        <div class="event-title">${ev.title}</div>
        ${ev.location ? `<div class="event-location">${ev.location}</div>` : ''}
      </div>
      ${relativeHtml}
    </div>
  `;
}

function renderNowIndicator() {
  return `
    <div class="now-indicator">
      <div class="now-indicator-dot"></div>
      <div class="now-indicator-label">NOW</div>
      <div class="now-indicator-line"></div>
    </div>
  `;
}

function declEvents(n) {
  const mod10 = n % 10;
  const mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return 'событий';
  if (mod10 === 1) return 'событие';
  if (mod10 >= 2 && mod10 <= 4) return 'события';
  return 'событий';
}

function renderAll() {
  // Main widget
  const mainData = EVENTS[currentState];
  renderWidget(document.getElementById('main-widget'), mainData, true);

  // 4x1 compact
  renderWidget(document.getElementById('widget-4x1'), EVENTS['few-events'], false);

  // 2x2 small with events
  renderWidget(document.getElementById('widget-2x2-a'), EVENTS['current-event'], false);

  // 2x2 empty
  renderWidget(document.getElementById('widget-2x2-b'), EVENTS['empty'], false);
}

// Initial render
renderAll();
