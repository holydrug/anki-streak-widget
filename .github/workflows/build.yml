name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Get version
        id: version
        run: |
          VERSION="v1.0.$(date +%Y%m%d)-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AnkiStreak-${{ steps.version.outputs.tag }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AnkiStreak ${{ steps.version.outputs.tag }}
          body: |
            ## AnkiStreak Widget

            Скачай APK и установи на телефон:
            1. Скачай `AnkiStreak-*.apk` ниже
            2. Открой на телефоне → Установить
            3. В AnkiDroid: Настройки → Расширенные → Разрешить доступ API
            4. Зажми домашний экран → Виджеты → AnkiStreak
          files: |
            app/build/outputs/apk/debug/AnkiStreak-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AnkiStreak-debug
          path: app/build/outputs/apk/debug/app-debug.apk
