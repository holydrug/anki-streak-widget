name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AnkiStreak.apk

      - name: Delete old release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AnkiStreak — скачай APK"
          body: |
            ## AnkiStreak Widget

            **Сборка:** `${{ github.sha }}` от `${{ github.event.head_commit.timestamp }}`

            ### Установка
            1. Скачай **AnkiStreak.apk** ниже
            2. Открой на телефоне → Установить
            3. В AnkiDroid: Настройки → Расширенные → Разрешить доступ API
            4. Зажми домашний экран → Виджеты → AnkiStreak
            5. Samsung: Настройки → Батарея → AnkiStreak → Не ограничивать
          files: app/build/outputs/apk/debug/AnkiStreak.apk
          make_latest: true
